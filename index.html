<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Photo Upload Portal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0c0f0a;
    --surface: #141710;
    --card: #1a1e16;
    --border: #2a2f24;
    --accent: #b5e048;
    --accent-dim: #8ab832;
    --text: #e8ead4;
    --muted: #7a8068;
    --danger: #e05c5c;
    --success: #4ecb71;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 40px 20px 80px;
    position: relative;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(181,224,72,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 90% 90%, rgba(181,224,72,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 560px;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 44px;
  }

  .logo-mark {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  .logo-icon {
    width: 44px;
    height: 44px;
    background: var(--accent);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-icon svg { width: 22px; height: 22px; }

  .logo-text {
    font-family: 'DM Serif Display', serif;
    font-size: 1.2rem;
    color: var(--text);
    letter-spacing: 0.02em;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 6vw, 3rem);
    line-height: 1.1;
    color: var(--text);
    margin-bottom: 12px;
  }

  h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .subtitle {
    font-size: 0.95rem;
    color: var(--muted);
    line-height: 1.6;
  }

  /* Card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(181,224,72,0.4), transparent);
  }

  /* Form fields */
  .field {
    margin-bottom: 22px;
  }

  label {
    display: block;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  input[type="text"],
  input[type="tel"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    padding: 13px 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input[type="text"]:focus,
  input[type="tel"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(181,224,72,0.12);
  }

  input::placeholder { color: var(--muted); opacity: 0.6; }

  /* Drop zone */
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 14px;
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s;
    background: var(--surface);
    position: relative;
    margin-bottom: 22px;
  }

  .drop-zone:hover,
  .drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(181,224,72,0.04);
  }

  .drop-zone.drag-over { transform: scale(1.01); }

  .drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    cursor: pointer;
  }

  .drop-icon {
    width: 52px;
    height: 52px;
    background: rgba(181,224,72,0.1);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
  }

  .drop-icon svg { width: 24px; height: 24px; stroke: var(--accent); }

  .drop-title {
    font-size: 1rem;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 6px;
  }

  .drop-hint {
    font-size: 0.82rem;
    color: var(--muted);
  }

  .drop-hint span {
    color: var(--accent);
    font-weight: 600;
  }

  /* File preview grid */
  .preview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
    gap: 10px;
    margin-bottom: 22px;
  }

  .preview-item {
    position: relative;
    aspect-ratio: 1;
    border-radius: 10px;
    overflow: hidden;
    background: var(--surface);
    border: 1px solid var(--border);
    animation: pop-in 0.2s ease;
  }

  @keyframes pop-in {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .preview-item img {
    width: 100%; height: 100%;
    object-fit: cover;
  }

  .preview-item .file-ext {
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }

  .file-ext-label {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .preview-item .remove-btn {
    position: absolute;
    top: 4px; right: 4px;
    width: 20px; height: 20px;
    background: rgba(0,0,0,0.7);
    border: none;
    border-radius: 50%;
    color: #fff;
    font-size: 0.65rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .preview-item:hover .remove-btn { opacity: 1; }

  .file-count-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(181,224,72,0.1);
    border: 1px solid rgba(181,224,72,0.2);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 0.82rem;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 22px;
  }

  /* Progress bar */
  .progress-wrap {
    display: none;
    margin-bottom: 22px;
  }

  .progress-wrap.active { display: block; }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .progress-bar-bg {
    background: var(--surface);
    border-radius: 99px;
    height: 6px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    width: 0%;
    transition: width 0.3s ease;
  }

  /* Submit button */
  .btn-submit {
    width: 100%;
    background: var(--accent);
    color: #0c0f0a;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    padding: 16px;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn-submit:hover {
    background: #c8f050;
    box-shadow: 0 8px 24px rgba(181,224,72,0.25);
    transform: translateY(-1px);
  }

  .btn-submit:active { transform: translateY(0); }

  .btn-submit:disabled {
    background: var(--border);
    color: var(--muted);
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .btn-submit .spinner {
    display: none;
    width: 18px; height: 18px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .btn-submit.loading .btn-label { display: none; }
  .btn-submit.loading .spinner { display: block; }

  /* Status messages */
  .status-msg {
    display: none;
    margin-top: 18px;
    padding: 14px 18px;
    border-radius: 10px;
    font-size: 0.9rem;
    line-height: 1.5;
    animation: fade-in 0.3s ease;
  }

  @keyframes fade-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  .status-msg.success {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: rgba(78,203,113,0.1);
    border: 1px solid rgba(78,203,113,0.3);
    color: var(--success);
  }

  .status-msg.error {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: rgba(224,92,92,0.1);
    border: 1px solid rgba(224,92,92,0.3);
    color: var(--danger);
  }

  /* Divider */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 28px 0;
  }

  /* Config notice */
  .config-notice {
    background: rgba(181,224,72,0.05);
    border: 1px solid rgba(181,224,72,0.15);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 28px;
    font-size: 0.85rem;
    color: var(--muted);
    line-height: 1.6;
  }

  .config-notice strong { color: var(--accent); }

  /* Footer */
  footer {
    text-align: center;
    margin-top: 36px;
    font-size: 0.78rem;
    color: var(--muted);
  }

  /* ── Mobile optimisations ─────────────────── */
  @media (max-width: 480px) {
    body {
      padding: 24px 16px 60px;
    }

    .wrap {
      max-width: 100%;
    }

    .logo-mark {
      margin-bottom: 14px;
    }

    .logo-icon {
      width: 38px;
      height: 38px;
    }

    h1 {
      font-size: clamp(1.6rem, 8vw, 2.2rem);
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.88rem;
    }

    header {
      margin-bottom: 28px;
    }

    .card {
      padding: 24px 18px;
    }

    input[type="text"],
    input[type="tel"] {
      font-size: 16px; /* prevents iOS zoom on focus */
      padding: 14px 14px;
    }

    .drop-zone {
      padding: 32px 16px;
    }

    .drop-icon {
      width: 44px;
      height: 44px;
    }

    .preview-grid {
      grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
      gap: 8px;
    }

    .btn-submit {
      padding: 18px; /* larger tap target */
      font-size: 1rem;
    }

    .divider {
      margin: 20px 0;
    }

    .file-count-badge {
      font-size: 0.78rem;
    }
  }

  /* ── Tap / touch improvements (all mobile) ── */
  @media (hover: none) and (pointer: coarse) {
    /* Remove hover states that feel sticky on touch */
    .btn-submit:hover {
      transform: none;
      box-shadow: none;
      background: var(--accent);
    }

    /* Larger remove button hit area */
    .preview-item .remove-btn {
      opacity: 1;
      width: 24px;
      height: 24px;
      font-size: 0.75rem;
    }

    /* Larger drop zone tap area */
    .drop-zone input[type="file"] {
      min-height: 100%;
    }
  }
</style>
</head>
<body>
<div class="wrap">

<script>
  // ─────────────────────────────────────────────
  //  PASTE YOUR APPS SCRIPT /exec URL BELOW
  //  Deploy → New Deployment → Web App → Anyone
  // ─────────────────────────────────────────────
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwqpYnIRVjIhkOU5GtFRHdceppnN6Yb1sL88lfPvq0m9GFDUBO-e_R8an5LwJ3giuw/exec';

  // ─────────────────────────────────────────────
  let selectedFiles = [];

  const dropZone   = document.getElementById('dropZone');
  const fileInput  = document.getElementById('fileInput');
  const previewGrid= document.getElementById('previewGrid');
  const countBadge = document.getElementById('countBadge');
  const countText  = document.getElementById('countText');
  const submitBtn  = document.getElementById('submitBtn');
  const statusMsg  = document.getElementById('statusMsg');
  const progressWrap = document.getElementById('progressWrap');
  const progressFill = document.getElementById('progressFill');
  const progressPct  = document.getElementById('progressPct');
  const progressLabel= document.getElementById('progressLabel');

  // Drag & drop handlers
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    addFiles([...e.dataTransfer.files]);
  });

  fileInput.addEventListener('change', () => {
    addFiles([...fileInput.files]);
    fileInput.value = '';
  });

  function addFiles(newFiles) {
    const images = newFiles.filter(f =>
      f.type.startsWith('image/') ||
      /\.(heic|heif|webp|tiff|tif|bmp|raw|cr2|nef|arw|dng)$/i.test(f.name)
    );
    selectedFiles = [...selectedFiles, ...images];
    renderPreviews();
  }

  function renderPreviews() {
    previewGrid.innerHTML = '';
    selectedFiles.forEach((file, idx) => {
      const item = document.createElement('div');
      item.className = 'preview-item';

      if (file.type.startsWith('image/') && !file.type.includes('heic')) {
        const img = document.createElement('img');
        img.src = URL.createObjectURL(file);
        item.appendChild(img);
      } else {
        const ext = file.name.split('.').pop().toUpperCase();
        item.innerHTML = `<div class="file-ext"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#b5e048" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg><span class="file-ext-label">${ext}</span></div>`;
      }

      const rm = document.createElement('button');
      rm.className = 'remove-btn';
      rm.innerHTML = '✕';
      rm.onclick = (e) => { e.stopPropagation(); selectedFiles.splice(idx, 1); renderPreviews(); };
      item.appendChild(rm);
      previewGrid.appendChild(item);
    });

    if (selectedFiles.length > 0) {
      countBadge.style.display = 'inline-flex';
      countText.textContent = `${selectedFiles.length} photo${selectedFiles.length !== 1 ? 's' : ''} selected`;
    } else {
      countBadge.style.display = 'none';
    }
  }

  function setProgress(pct, label) {
    progressFill.style.width = pct + '%';
    progressPct.textContent = pct + '%';
    if (label) progressLabel.textContent = label;
  }

  function showStatus(type, msg) {
    const icon = type === 'success'
      ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>`
      : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;
    statusMsg.className = `status-msg ${type}`;
    statusMsg.innerHTML = icon + `<span>${msg}</span>`;
  }

  async function handleUpload() {
    const name  = document.getElementById('nameInput').value.trim();
    const phone = document.getElementById('phoneInput').value.trim();

    if (!name)              return showStatus('error', 'Please enter your name.');
    if (!phone)             return showStatus('error', 'Please enter your phone number.');
    if (selectedFiles.length === 0) return showStatus('error', 'Please select at least one photo.');
    if (SCRIPT_URL === 'YOUR_APPS_SCRIPT_WEB_APP_URL_HERE')
      return showStatus('error', 'Apps Script URL not configured. See README.md.');

    submitBtn.disabled = true;
    submitBtn.classList.add('loading');
    statusMsg.className = 'status-msg';
    progressWrap.classList.add('active');
    setProgress(0, 'Preparing upload…');

    try {
      // Upload files one at a time so we can show progress
      for (let i = 0; i < selectedFiles.length; i++) {
        const file = selectedFiles[i];
        const pct = Math.round(((i) / selectedFiles.length) * 90);
        setProgress(pct, `Uploading ${i + 1} of ${selectedFiles.length}…`);

        const base64 = await toBase64(file);
        const payload = {
          name,
          phone,
          fileName: file.name,
          mimeType: file.type || 'application/octet-stream',
          data: base64,
          totalFiles: selectedFiles.length,
          fileIndex: i
        };

        const resp = await fetch(SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify(payload)
        });

        if (!resp.ok) throw new Error(`Server error on file ${i + 1}`);
      }

      setProgress(100, 'Complete!');
      showStatus('success', `✅ ${selectedFiles.length} photo${selectedFiles.length !== 1 ? 's' : ''} uploaded successfully for ${name}! Thank you.`);
      selectedFiles = [];
      renderPreviews();
      document.getElementById('nameInput').value = '';
      document.getElementById('phoneInput').value = '';
      setTimeout(() => progressWrap.classList.remove('active'), 2000);

    } catch (err) {
      showStatus('error', `Upload failed: ${err.message}. Please try again.`);
      progressWrap.classList.remove('active');
    }

    submitBtn.disabled = false;
    submitBtn.classList.remove('loading');
  }

  function toBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }
</script>
</body>
</html>
