<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Photo Upload Portal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0c0f0a;
    --surface: #141710;
    --card: #1a1e16;
    --border: #2a2f24;
    --accent: #b5e048;
    --text: #e8ead4;
    --muted: #7a8068;
    --danger: #e05c5c;
    --success: #4ecb71;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { -webkit-text-size-adjust: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 40px 20px 80px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(181,224,72,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 90% 90%, rgba(181,224,72,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 540px;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
  }

  .logo-mark {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
  }

  .logo-icon {
    width: 44px; height: 44px;
    background: var(--accent);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .logo-text {
    font-family: 'DM Serif Display', serif;
    font-size: 1.15rem;
    color: var(--text);
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.8rem, 6vw, 3rem);
    line-height: 1.1;
    margin-bottom: 10px;
  }

  h1 em { font-style: italic; color: var(--accent); }

  .subtitle {
    font-size: 0.95rem;
    color: var(--muted);
    line-height: 1.6;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(181,224,72,0.4), transparent);
  }

  .field { margin-bottom: 20px; }

  label {
    display: block;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  input[type="text"],
  input[type="tel"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px; /* 16px prevents iOS zoom */
    padding: 14px 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }

  input[type="text"]:focus,
  input[type="tel"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(181,224,72,0.12);
  }

  input::placeholder { color: var(--muted); opacity: 0.6; }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 24px 0;
  }

  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 14px;
    padding: 44px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s;
    background: var(--surface);
    position: relative;
    margin-bottom: 20px;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(181,224,72,0.04);
  }

  .drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    cursor: pointer;
    font-size: 16px;
  }

  .drop-icon {
    width: 52px; height: 52px;
    background: rgba(181,224,72,0.1);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 14px;
  }

  .drop-icon svg { width: 24px; height: 24px; stroke: var(--accent); }

  .drop-title { font-size: 1rem; font-weight: 500; margin-bottom: 6px; }

  .drop-hint { font-size: 0.82rem; color: var(--muted); }
  .drop-hint span { color: var(--accent); font-weight: 600; }

  .preview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(76px, 1fr));
    gap: 10px;
    margin-bottom: 20px;
  }

  .preview-item {
    position: relative;
    aspect-ratio: 1;
    border-radius: 10px;
    overflow: hidden;
    background: var(--surface);
    border: 1px solid var(--border);
    animation: pop-in 0.2s ease;
  }

  @keyframes pop-in {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .preview-item img { width: 100%; height: 100%; object-fit: cover; }

  .preview-item .file-ext {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 4px;
  }

  .file-ext-label {
    font-size: 0.6rem; font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .preview-item .remove-btn {
    position: absolute;
    top: 4px; right: 4px;
    width: 22px; height: 22px;
    background: rgba(0,0,0,0.75);
    border: none; border-radius: 50%;
    color: #fff; font-size: 0.65rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .preview-item:hover .remove-btn { opacity: 1; }

  /* Always show remove btn on touch */
  @media (hover: none) {
    .preview-item .remove-btn { opacity: 1; }
  }

  .file-count-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(181,224,72,0.1);
    border: 1px solid rgba(181,224,72,0.2);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 0.82rem;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 20px;
  }

  .progress-wrap { display: none; margin-bottom: 20px; }
  .progress-wrap.active { display: block; }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .progress-bar-bg {
    background: var(--surface);
    border-radius: 99px;
    height: 6px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    width: 0%;
    transition: width 0.3s ease;
  }

  .btn-submit {
    width: 100%;
    background: var(--accent);
    color: #0c0f0a;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    padding: 16px;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    -webkit-appearance: none;
    touch-action: manipulation;
  }

  .btn-submit:hover {
    background: #c8f050;
    box-shadow: 0 8px 24px rgba(181,224,72,0.25);
    transform: translateY(-1px);
  }

  .btn-submit:active { transform: translateY(0); }

  .btn-submit:disabled {
    background: var(--border);
    color: var(--muted);
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .btn-submit .spinner {
    display: none;
    width: 18px; height: 18px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .btn-submit.loading .btn-label { display: none; }
  .btn-submit.loading .spinner { display: block; }

  .status-msg {
    display: none;
    margin-top: 16px;
    padding: 14px 16px;
    border-radius: 10px;
    font-size: 0.9rem;
    line-height: 1.5;
    animation: fade-in 0.3s ease;
  }

  @keyframes fade-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  .status-msg.success {
    display: flex; align-items: flex-start; gap: 10px;
    background: rgba(78,203,113,0.1);
    border: 1px solid rgba(78,203,113,0.3);
    color: var(--success);
  }

  .status-msg.error {
    display: flex; align-items: flex-start; gap: 10px;
    background: rgba(224,92,92,0.1);
    border: 1px solid rgba(224,92,92,0.3);
    color: var(--danger);
  }

  footer {
    text-align: center;
    margin-top: 32px;
    font-size: 0.75rem;
    color: var(--muted);
  }

  /* ── Mobile ──────────────────────────────── */
  @media (max-width: 480px) {
    body { padding: 24px 16px 60px; }
    header { margin-bottom: 28px; }
    .card { padding: 22px 16px; border-radius: 16px; }
    h1 { font-size: clamp(1.6rem, 8vw, 2rem); }
    .drop-zone { padding: 32px 16px; }
    .preview-grid { grid-template-columns: repeat(auto-fill, minmax(68px, 1fr)); }
    .btn-submit { padding: 18px; min-height: 56px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo-mark">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0c0f0a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 16l4-4 4 4 4-6 4 6"/>
          <rect x="2" y="2" width="20" height="20" rx="3"/>
        </svg>
      </div>
      <span class="logo-text">Photo Portal</span>
    </div>
    <h1>Upload Your <em>Photos</em></h1>
    <p class="subtitle">Drag & drop or select images below.<br>No account needed — just your name and number.</p>
  </header>

  <div class="card">
    <div class="field">
      <label for="nameInput">Your Name</label>
      <input type="text" id="nameInput" placeholder="Jane Smith" autocomplete="name" />
    </div>

    <div class="field">
      <label for="phoneInput">Phone Number</label>
      <input type="tel" id="phoneInput" placeholder="(214) 555-0100" autocomplete="tel" />
    </div>

    <hr class="divider" />

    <label>Photos</label>
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept="image/*,.heic,.heif,.webp,.tiff,.tif,.bmp,.raw,.cr2,.nef,.arw" multiple />
      <div class="drop-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 16 12 12 8 16"/>
          <line x1="12" y1="12" x2="12" y2="21"/>
          <path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/>
        </svg>
      </div>
      <p class="drop-title">Drop photos here</p>
      <p class="drop-hint">or <span>browse files</span> — JPG, PNG, HEIC, WEBP, RAW & more</p>
    </div>

    <div class="preview-grid" id="previewGrid"></div>

    <div class="file-count-badge" id="countBadge" style="display:none;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
      <span id="countText">0 photos selected</span>
    </div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-label">
        <span id="progressLabel">Uploading…</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
    </div>

    <button class="btn-submit" id="submitBtn" onclick="handleUpload()">
      <span class="btn-label">Upload Photos</span>
      <div class="spinner"></div>
    </button>

    <div class="status-msg" id="statusMsg"></div>
  </div>

  <footer>Powered by Google Drive &amp; Apps Script</footer>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwqpYnIRVjIhkOU5GtFRHdceppnN6Yb1sL88lfPvq0m9GFDUBO-e_R8an5LwJ3giuw/exec';

  let selectedFiles = [];

  const dropZone    = document.getElementById('dropZone');
  const fileInput   = document.getElementById('fileInput');
  const previewGrid = document.getElementById('previewGrid');
  const countBadge  = document.getElementById('countBadge');
  const countText   = document.getElementById('countText');
  const submitBtn   = document.getElementById('submitBtn');
  const statusMsg   = document.getElementById('statusMsg');
  const progressWrap = document.getElementById('progressWrap');
  const progressFill = document.getElementById('progressFill');
  const progressPct  = document.getElementById('progressPct');
  const progressLabel= document.getElementById('progressLabel');

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    addFiles([...e.dataTransfer.files]);
  });

  fileInput.addEventListener('change', () => {
    addFiles([...fileInput.files]);
    fileInput.value = '';
  });

  function addFiles(newFiles) {
    const images = newFiles.filter(f =>
      f.type.startsWith('image/') ||
      /\.(heic|heif|webp|tiff|tif|bmp|raw|cr2|nef|arw|dng)$/i.test(f.name)
    );
    selectedFiles = [...selectedFiles, ...images];
    renderPreviews();
  }

  function renderPreviews() {
    previewGrid.innerHTML = '';
    selectedFiles.forEach((file, idx) => {
      const item = document.createElement('div');
      item.className = 'preview-item';

      if (file.type.startsWith('image/') && !file.type.includes('heic')) {
        const img = document.createElement('img');
        img.src = URL.createObjectURL(file);
        item.appendChild(img);
      } else {
        const ext = file.name.split('.').pop().toUpperCase();
        item.innerHTML = `<div class="file-ext"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#b5e048" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg><span class="file-ext-label">${ext}</span></div>`;
      }

      const rm = document.createElement('button');
      rm.className = 'remove-btn';
      rm.innerHTML = '✕';
      rm.onclick = e => { e.stopPropagation(); selectedFiles.splice(idx, 1); renderPreviews(); };
      item.appendChild(rm);
      previewGrid.appendChild(item);
    });

    countBadge.style.display = selectedFiles.length > 0 ? 'inline-flex' : 'none';
    countText.textContent = `${selectedFiles.length} photo${selectedFiles.length !== 1 ? 's' : ''} selected`;
  }

  function setProgress(pct, label) {
    progressFill.style.width = pct + '%';
    progressPct.textContent = pct + '%';
    if (label) progressLabel.textContent = label;
  }

  function showStatus(type, msg) {
    const icon = type === 'success'
      ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>`
      : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;
    statusMsg.className = `status-msg ${type}`;
    statusMsg.innerHTML = icon + `<span>${msg}</span>`;
  }

  async function handleUpload() {
    const name  = document.getElementById('nameInput').value.trim();
    const phone = document.getElementById('phoneInput').value.trim();

    if (!name)  return showStatus('error', 'Please enter your name.');
    if (!phone) return showStatus('error', 'Please enter your phone number.');
    if (selectedFiles.length === 0) return showStatus('error', 'Please select at least one photo.');

    submitBtn.disabled = true;
    submitBtn.classList.add('loading');
    statusMsg.className = 'status-msg';
    progressWrap.classList.add('active');
    setProgress(0, 'Preparing upload…');

    try {
      for (let i = 0; i < selectedFiles.length; i++) {
        const file = selectedFiles[i];
        const pct = Math.round((i / selectedFiles.length) * 90);
        setProgress(pct, `Uploading ${i + 1} of ${selectedFiles.length}…`);

        const base64 = await toBase64(file);
        const payload = {
          name, phone,
          fileName: file.name,
          mimeType: file.type || 'application/octet-stream',
          data: base64,
          totalFiles: selectedFiles.length,
          fileIndex: i
        };

        const resp = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
        if (!resp.ok) throw new Error(`Server error on file ${i + 1}`);
      }

      setProgress(100, 'Complete!');
      showStatus('success', `✅ ${selectedFiles.length} photo${selectedFiles.length !== 1 ? 's' : ''} uploaded for ${name}! Thank you.`);
      selectedFiles = [];
      renderPreviews();
      document.getElementById('nameInput').value = '';
      document.getElementById('phoneInput').value = '';
      setTimeout(() => progressWrap.classList.remove('active'), 2000);

    } catch (err) {
      showStatus('error', `Upload failed: ${err.message}. Please try again.`);
      progressWrap.classList.remove('active');
    }

    submitBtn.disabled = false;
    submitBtn.classList.remove('loading');
  }

  function toBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }
</script>
</body>
</html>
